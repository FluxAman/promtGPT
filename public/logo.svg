<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#ff00ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <rect width="100" height="100" fill="#000000" rx="20"/>
  
  <g filter="url(#glow)">
    <!-- Chat Bubble -->
    <path d="M 25 30 
             C 25 20, 30 15, 40 15 
             L 75 15 
             C 85 15, 90 20, 90 30 
             L 90 60 
             C 90 70, 85 75, 75 75 
             L 45 75 
             L 25 90 
             L 25 70 
             C 25 70, 25 70, 25 60 Z" 
          fill="none" 
          stroke="url(#neon-grad)" 
          stroke-width="6" 
          stroke-linejoin="round" />
          
    <!-- Terminal Prompt > -->
    <path d="M 40 40 L 50 50 L 40 60" 
          fill="none" 
          stroke="url(#neon-grad)" 
          stroke-width="5" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
          
    <!-- Terminal Cursor _ -->
    <line x1="55" y1="60" x2="65" y2="60" 
          stroke="#ff00ff" 
          stroke-width="5" 
          stroke-linecap="round" />
  </g>
</svg>
